services:
  postgres:
    image: postgres:16-alpine
    container_name: icoporama-postgres
    environment:
      POSTGRES_DB: icoporama
      POSTGRES_USER: icoporama
      POSTGRES_PASSWORD: icoporama
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icoporama -d icoporama"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: icoporama-web
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres_data:
